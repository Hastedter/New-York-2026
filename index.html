<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>NYC Top 20 Abstimmung</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-family: Arial, sans-serif;
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

label {
  display: block;
  padding: 6px;
  margin: 4px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
  cursor: pointer;
}

.free { background:#e9f7ef; }
.pass { background:#e8f1fc; }
.ticket { background:#fff4db; }

button {
  padding: 10px;
  margin-top: 10px;
  cursor: pointer;
}

#count {
  font-weight: bold;
}
</style>

</head>

<body>

<h1>🗽 New York – TOP 20 Abstimmung</h1>

<p>Dein Name:</p>
<input type="text" id="username" placeholder="Name eingeben">

<p id="count">0 / 20 ausgewählt</p>

<button onclick="togglePass()">🔎 Nur New York Pass anzeigen</button>

<div id="options"></div>

<h2>🏆 Deine Auswahl</h2>
<ol id="ranking"></ol>

<button onclick="sendData()">📤 Ergebnis senden</button>
<p id="status"></p>

<script>

// ✅ DEINE GOOGLE SCRIPT URL
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyoJwV0GHwkApF87u0CCrrVuoUBY9cvD2h-ChUi9w87WGtGPGtHM8_6fkYCbxRCH8o_7A/exec";

// ✅ SEHENSWÜRDIGKEITEN
const items = [
{name:"Empire State Building", type:"pass"},
{name:"Central Park", type:"free"},
{name:"Brooklyn Bridge", type:"free"},
{name:"Times Square", type:"free"},
{name:"Statue of Liberty", type:"pass"},
{name:"Top of the Rock", type:"pass"},
{name:"DUMBO", type:"free"},
{name:"Wall Street", type:"free"},
{name:"One World Trade Center", type:"pass"},
{name:"Oculus", type:"free"},
{name:"Grand Central Terminal", type:"free"},
{name:"High Line Park", type:"free"},
{name:"Summit One Vanderbilt", type:"pass"},
{name:"Edge Hudson Yards", type:"pass"},
{name:"Hafenrundfahrt", type:"pass"},
{name:"MET Museum", type:"pass"},
{name:"MoMA", type:"pass"},
{name:"Natural History Museum", type:"pass"},
{name:"Staten Island Ferry", type:"free"},
{name:"5th Avenue", type:"free"},
{name:"Flatiron Building", type:"free"},
{name:"Little Italy", type:"free"},
{name:"Chinatown", type:"free"},
{name:"Bryant Park", type:"free"},
{name:"New York Public Library", type:"free"},
{name:"Hard Rock Cafe NYC", type:"free"},
{name:"Broadway Musical", type:"ticket"},
{name:"Radio City Music Hall", type:"ticket"},
{name:"Dyker Heights Lights", type:"free"},
{name:"9/11 Museum", type:"pass"},
{name:"Gospel Harlem", type:"free"},
{name:"Yankee Stadium", type:"ticket"},
{name:"Chelsea Market", type:"free"},
{name:"SoHo", type:"free"},
{name:"Brooklyn Heights Promenade", type:"free"},

// ✅ NEU HINZUGEFÜGT
{name:"Brooklyn allgemein", type:"free"},
{name:"Bronx allgemein", type:"free"}

];

// ✅ STATE
let selected = [];
let passOnly = false;

// ✅ RENDER
function render() {
  const optionsDiv = document.getElementById("options");
  const ranking = document.getElementById("ranking");

  optionsDiv.innerHTML = "";
  ranking.innerHTML = "";

  document.getElementById("count").innerText =
    selected.length + " / 20 ausgewählt";

  items
    .filter(i => !passOnly || i.type === "pass")
    .forEach(i => {

      let label = document.createElement("label");
      label.className = i.type;

      let cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = selected.includes(i.name);
      cb.disabled = !cb.checked && selected.length >= 20;

      cb.onchange = () => toggle(i.name);

      label.appendChild(cb);
      label.append(" " + i.name);

      optionsDiv.appendChild(label);
    });

  selected.forEach(s => {
    let li = document.createElement("li");
    li.textContent = s;
    ranking.appendChild(li);
  });
}

// ✅ TOGGLE
function toggle(name) {
  if (selected.includes(name)) {
    selected = selected.filter(x => x !== name);
  } else if (selected.length < 20) {
    selected.push(name);
  }
  render();
}

// ✅ FILTER
function togglePass() {
  passOnly = !passOnly;
  render();
}

// ✅ SENDEN (FIXED VERSION)
function sendData() {
  let name = document.getElementById("username").value;

  if (!name) {
    alert("Bitte Namen eingeben");
    return;
  }

  if (selected.length === 0) {
    alert("Bitte Auswahl treffen");
    return;
  }

  let formData = new FormData();
  formData.append("name", name);
  formData.append("selection", selected.join(", "));

  fetch(SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    body: formData
  });

  document.getElementById("status").innerText = "✅ Gesendet!";
}

// ✅ START
render();

</script>

</body>
</html>
